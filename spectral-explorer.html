<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectral Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bord: #ccc8c0;
    --ink:  #1a1714;
    --mut:  #888078;
    --paper:#ffffff;
    --font: 'DM Mono', monospace;

    /* Interface font — 18px matching JUST_SO / Springer Lab */
    --fs: 18px;

    /* Viridis blues */
    --vb-lo:      #9dd8c8;
    --vb-lo-bord: #6bbfad;
    --vb-lo-text: #1a1714;
    --vb-hi:      #2c7bb6;
    --vb-hi-bord: #1d5a8a;
    --vb-hi-text: #ffffff;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ══════════════════════════════════════════════════
     ROW 1 — Header
     18px font → 52px height (matches Springer Lab)
     padding 0 20px, gap 10px between buttons
     ══════════════════════════════════════════════════ */
  #hdr {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 52px;
    background: var(--paper);
    border-bottom: 1px solid var(--bord);
    flex-shrink: 0;
    gap: 10px;
  }
  .logo {
    font-size: var(--fs);
    font-weight: 400;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .hdr-gap { flex: 1; }

  /* Dark viridis blue — Load File */
  .abtn {
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    height: 36px;
    padding: 0 14px;
    border: 1px solid var(--vb-hi-bord);
    background: var(--vb-hi);
    color: var(--vb-hi-text);
    border-radius: 2px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
  }
  .abtn:hover { background: var(--vb-hi-bord); border-color: var(--vb-hi-bord); }

  /* Light viridis blue — Load Example, Download Example */
  .fbtn {
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    height: 36px;
    padding: 0 14px;
    border: 1px solid var(--vb-lo-bord);
    background: var(--vb-lo);
    color: var(--vb-lo-text);
    border-radius: 2px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
  }
  .fbtn:hover { background: var(--vb-lo-bord); border-color: var(--vb-lo-bord); }

  #file-input { display: none; }

  /* ══════════════════════════════════════════════════
     ROW 2 — Status bar
     18px font → 32px height (matches Springer Lab)
     light viridis blue background
     ══════════════════════════════════════════════════ */
  #statusBar {
    display: none;
    align-items: center;
    padding: 0 20px;
    height: 32px;
    background: var(--vb-lo);
    border-bottom: 1px solid var(--vb-lo-bord);
    flex-shrink: 0;
    font-size: var(--fs);
    font-weight: 400;
    color: var(--vb-lo-text);
  }
  #statusLeft  { flex: 1; }

  /* ══════════════════════════════════════════════════
     ROW 3 — Toolbar
     18px font → 40px height (matches Springer Lab legBar)
     ══════════════════════════════════════════════════ */
  #toolBar {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 40px;
    background: var(--paper);
    border-bottom: 1px solid var(--bord);
    flex-shrink: 0;
    gap: 12px;
  }
  .lbl {
    font-size: var(--fs);
    font-weight: 400;
    color: var(--mut);
  }
  /* Number inputs — scaled to 18px */
  .tb-num {
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    height: 28px;
    padding: 0 6px;
    border: 1px solid var(--bord);
    background: var(--paper);
    color: var(--ink);
    border-radius: 2px;
    text-align: center;
    outline: none;
  }
  .tb-num:focus { border-color: var(--mut); }
  #ncols-input  { width: 56px; }
  #width-input  { width: 80px; }
  #offset-input { width: 56px; }
  #xmin-input, #xmax-input { width: 62px; }

  /* Y-scale dropdown — matches tb-num height/font */
  .tb-sel {
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    height: 28px;
    padding: 0 6px;
    border: 1px solid var(--bord);
    background: var(--paper);
    color: var(--ink);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .tb-sel:focus { border-color: var(--mut); }

  /* Group label ("X:") sits tighter than free labels */
  .tb-group-lbl { margin-left: 8px; }
  .tb-sub-lbl   { color: var(--mut); margin-left: 2px; }

  .lbl[for] { cursor: pointer; }

  .tb-gap { flex: 1; }

  /* Download PNG — dark viridis blue */
  #downloadBtn {
    font-family: var(--font);
    font-size: var(--fs);
    font-weight: 400;
    height: 36px;
    padding: 0 14px;
    border: 1px solid var(--vb-hi-bord);
    background: var(--vb-hi);
    color: var(--vb-hi-text);
    border-radius: 2px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
  }
  #downloadBtn:hover:not(:disabled) { background: var(--vb-hi-bord); border-color: var(--vb-hi-bord); }
  #downloadBtn:disabled { opacity: 0.35; cursor: default; }

  /* ── Drop zone ── */
  #dropZone { flex: 1; position: relative; overflow-y: auto; background: var(--paper); }
  #dropZone.drag-over::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(44,123,182,.06);
    border: 3px dashed var(--vb-hi);
    z-index: 200; pointer-events: none;
  }
  #dropZone.drag-over::after {
    content: 'Drop to load';
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: var(--font); font-size: var(--fs); font-weight: 400;
    color: var(--vb-hi); background: var(--paper);
    padding: 12px 24px; border: 2px solid var(--vb-hi);
    z-index: 201; pointer-events: none;
  }

  /* ── Welcome ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 28px; gap: 14px; text-align: center;
  }
  #welcome h2 {
    font-size: var(--fs); font-weight: 400; color: var(--mut);
    text-transform: uppercase; letter-spacing: .1em;
  }
  #welcome p  { font-size: var(--fs); font-weight: 400; color: var(--mut); line-height: 1.8; }
  #welcome strong { font-weight: 400; color: var(--ink); }
  #welcome .drop-hint {
    font-size: var(--fs); font-weight: 400; color: var(--vb-hi);
    border: 1px dashed var(--vb-hi); padding: 10px 24px; margin-top: 8px; opacity: .8;
  }

  /* ── Loading ── */
  #loading {
    display: none; font-size: var(--fs); font-weight: 400; color: var(--mut);
    padding: 100px 28px; text-align: center; letter-spacing: .05em;
  }

  /* ── Grid — SVG text stays at 12px (figure internals, not interface) ── */
  #main { padding: 16px 20px 52px; display: none; background: var(--paper); }
  .grid-wrapper { display: inline-block; }
  #grid { display: grid; }
  .panel-cell { background: var(--paper); }
  .panel-cell svg { display: block; }

  /* ── Footer ── */
  #footerArea { margin-top: 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  #plotTitle    { font-size: var(--fs); font-weight: 400; color: var(--ink); text-align: center; }
  #plotSubtitle { font-size: var(--fs); font-weight: 400; color: var(--mut); text-align: center; }
</style>
</head>
<body>

<!-- Row 1: Header — 52px -->
<div id="hdr">
  <span class="logo">Spectral Explorer</span>
  <div class="hdr-gap"></div>
  <button class="abtn"  id="uploadBtn">Load File</button>
  <button class="fbtn"  id="loadExBtn">Load Example</button>
  <button class="fbtn"  id="dlExBtn">Download Example</button>
  <input type="file" id="file-input" accept=".txt">
</div>

<!-- Row 2: Status bar — 32px, light viridis blue -->
<div id="statusBar">
  <span id="statusLeft"></span>
  <span id="statusRight"></span>
</div>

<!-- Row 3: Toolbar — 40px -->
<div id="toolBar">
  <label class="lbl" for="yscale-input">Y:</label>
  <select id="yscale-input" class="tb-sel">
    <option value="raw">Raw</option>
    <option value="norm">Normalize to 1</option>
    <option value="log">Log scale</option>
  </select>
  <span class="lbl tb-group-lbl">X:</span>
  <label class="lbl tb-sub-lbl" for="xmin-input">min</label>
  <input type="number" id="xmin-input" class="tb-num" value="400" min="300" max="800" step="1">
  <label class="lbl tb-sub-lbl" for="xmax-input">max</label>
  <input type="number" id="xmax-input" class="tb-num" value="700" min="300" max="900" step="1">
  <label class="lbl tb-sub-lbl" for="offset-input" title="Wavelength calibration offset added to raw values from the instrument">&lambda; offset</label>
  <input type="number" id="offset-input" class="tb-num" value="25" min="-100" max="100" step="1">
  <div class="tb-gap"></div>
  <label class="lbl" for="ncols-input">Columns:</label>
  <input type="number" id="ncols-input" class="tb-num" value="12" min="1" max="24">
  <label class="lbl" for="width-input">Width (px):</label>
  <input type="number" id="width-input" class="tb-num" value="2000" min="400" max="16000" step="100">
  <button id="downloadBtn" disabled>Download PNG</button>
</div>

<!-- Content -->
<div id="dropZone">
  <div id="loading">Computing LOESS fits&hellip;</div>

  <div id="welcome">
    <h2>No data loaded</h2>
    <p>Click <strong>Load File</strong> to open a SpectraMax .txt file,<br>
       or <strong>Load Example</strong> to explore the built-in dataset.</p>
    <div class="drop-hint">or drag &amp; drop a file anywhere on this page</div>
  </div>

  <div id="main">
    <div class="grid-wrapper"><div id="grid"></div></div>
    <div id="footerArea">
      <svg id="colorbarSvg" width="440" height="42"></svg>
      <div id="plotTitle"></div>
      <div id="plotSubtitle">Points = Relative Intensity Data &middot; Lines = LOESS Fitted Curves</div>
    </div>
  </div>
</div>

<script>
// Figure-internal text stays at 12px — this is NOT interface text
const SVG_FS   = '12px';
const SVG_FONT = "'DM Mono', monospace";
const INK      = '#1a1714';
const MUT      = '#888078';
const BORD     = '#ccc8c0';

let loadedBasename = 'spectral_export';

// ─── Spectral colour mapping ──────────────────────────────────────────────────
function wavelengthToColor(nm) {
  const stops = [
    {w:400,r:46, g:0,  b:84 },{w:450,r:75, g:0,  b:130},
    {w:475,r:0,  g:0,  b:255},{w:510,r:0,  g:255,b:255},
    {w:540,r:0,  g:255,b:0  },{w:570,r:255,g:255,b:0  },
    {w:590,r:255,g:165,b:0  },{w:620,r:255,g:0,  b:0  },
    {w:700,r:139,g:0,  b:0  }
  ];
  nm = Math.max(400, Math.min(700, nm));
  let i = 0;
  while (i < stops.length-2 && stops[i+1].w <= nm) i++;
  const lo=stops[i], hi=stops[i+1], t=(nm-lo.w)/(hi.w-lo.w);
  return `rgb(${Math.round(lo.r+t*(hi.r-lo.r))},${Math.round(lo.g+t*(hi.g-lo.g))},${Math.round(lo.b+t*(hi.b-lo.b))})`;
}

// ─── LOESS ───────────────────────────────────────────────────────────────────
function loess(xs, ys, span=0.1, nOut=300) {
  const n=xs.length, k=Math.max(4,Math.ceil(span*n));
  const xmin=Math.min(...xs), xmax=Math.max(...xs);
  const out=[];
  for (let j=0;j<nOut;j++) {
    const x0=xmin+j*(xmax-xmin)/(nOut-1);
    const dists=xs.map(x=>Math.abs(x-x0));
    const hk=dists.slice().sort((a,b)=>a-b)[Math.min(k-1,n-1)]*1.0001;
    let sw=0,swy=0,swx=0,swxy=0,swx2=0;
    for (let i=0;i<n;i++){
      const u=dists[i]/hk; if(u>=1) continue;
      const w=Math.pow(1-u*u*u,3);
      sw+=w; swy+=w*ys[i]; swx+=w*xs[i]; swxy+=w*xs[i]*ys[i]; swx2+=w*xs[i]*xs[i];
    }
    if(sw===0) continue;
    const D=sw*swx2-swx*swx;
    const y=Math.abs(D)<1e-10 ? swy/sw : ((sw*swxy-swx*swy)/D)*x0+((swy*swx2-swx*swxy)/D);
    out.push({x:x0,y});
  }
  return out;
}

// ─── Plate layout ─────────────────────────────────────────────────────────────
// Standard microplate formats. Detected from the well-column count in the file:
//   96 wells  → 8 rows × 12 cols (A1..H12)
//   384 wells → 16 rows × 24 cols (A1..P24)
// Anything else → no plate layout, wells render packed left-to-right.
const PLATE_FORMATS = {
  96:  { rows: 8,  cols: 12 },
  384: { rows: 16, cols: 24 }
};
function plateCoord(idx, nCols) {
  const row = Math.floor(idx / nCols), col = idx % nCols;
  return { row, col, name: String.fromCharCode(65 + row) + (col + 1) };
}

// ─── Parse SpectraMax ─────────────────────────────────────────────────────────
// SpectraMax tab-delimited .txt format:
//   col 0 = wavelength (raw, nm), col 1 = temperature (°C), cols 2..N = wells.
//   Header row begins with "Wavelength(nm)" and names each well column.
// `wavelengthOffset` is added to every raw wavelength to correct for instrument
// miscalibration (exposed in the toolbar as "λ offset").
//
// Returns { wells, plate } where:
//   wells = array of { name, wavelengths, intensities, plateIdx } for non-empty slots
//   plate = { rows, cols, slots: nWellCols } if a standard format was detected,
//           or null otherwise. `slots` is the total number of well columns in the file.
function parseSpectraMax(text, wavelengthOffset) {
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = text.split('\n');
  let hIdx=-1;
  for (let i=0;i<lines.length;i++) {
    if (/^Wavelength\(nm\)/i.test(lines[i])) { hIdx=i; break; }
  }
  if (hIdx<0) throw new Error('Cannot find "Wavelength(nm)" header row');
  const hCols=lines[hIdx].split('\t');
  const dataLines=[];
  for (let i=hIdx+1;i<lines.length;i++) {
    const l=lines[i], first=l.split('\t')[0].trim();
    if (!first||l.trim().startsWith('~')||/^Wavelength/i.test(l.trim())) break;
    if (!/^\d/.test(first)) break;
    dataLines.push(l.split('\t'));
  }
  if (!dataLines.length) throw new Error('No numeric data rows found after header');
  const wavelengths=dataLines.map(r=>parseFloat(r[0])+wavelengthOffset);
  const minPts=Math.floor(dataLines.length*0.5);

  // Count well columns. SpectraMax exports often have trailing empty tab-separated
  // slots up to the full plate width (e.g. 96 columns even when only 48 wells were used).
  // We trim purely-empty trailing slots only if doing so doesn't drop us out of a
  // recognized plate format — otherwise we keep them as placeholders.
  let nWellCols = hCols.length - 2;
  // Trim trailing slots that are empty in BOTH header and all data rows.
  while (nWellCols > 0) {
    const c = nWellCols + 1; // file column index
    const headerEmpty = !(hCols[c]||'').trim();
    let dataEmpty = true;
    for (let r=0;r<dataLines.length && dataEmpty;r++) {
      if ((dataLines[r][c]||'').trim()) dataEmpty = false;
    }
    if (headerEmpty && dataEmpty) nWellCols--;
    else break;
  }
  // If trimming dropped us just below a plate format, restore it.
  for (const target of [96, 384]) {
    if (nWellCols < target && (hCols.length - 2) >= target) { nWellCols = target; break; }
  }

  const plate = PLATE_FORMATS[nWellCols] ? { ...PLATE_FORMATS[nWellCols], slots: nWellCols } : null;

  const wells=[];
  for (let i=0;i<nWellCols;i++) {
    const c = i + 2;
    const name=(hCols[c]||'').trim();
    const wls=[],vals=[];
    for (let r=0;r<dataLines.length;r++) {
      const raw=(dataLines[r][c]||'').trim(); if(!raw) continue;
      const v=parseFloat(raw); if(!isNaN(v)){wls.push(wavelengths[r]);vals.push(v);}
    }
    // A well slot is "real" if it has enough numeric data. Unnamed-but-with-data
    // slots get a plate-coordinate name (A1, B7, etc.) if we know the plate format.
    if (vals.length>=minPts) {
      const displayName = name || (plate ? plateCoord(i, plate.cols).name : `W${i+1}`);
      wells.push({ name: displayName, wavelengths: wls, intensities: vals, plateIdx: i });
    }
    // Otherwise: empty slot. Plate-mode rendering will draw a placeholder; packed
    // mode just skips it (the wells array remains dense).
  }
  if (!wells.length) throw new Error('No columns with sufficient data found');
  return { wells, plate };
}

// ─── Process wells ────────────────────────────────────────────────────────────
function processWells(raw) {
  return raw.map(w=>{
    if (w.wavelengths.length<6) return null;
    const xs=w.wavelengths, ys=w.intensities;
    const curve=loess(xs,ys,0.1,300); if(!curve.length) return null;
    // Peak wavelength = argmax over LOESS curve (normalizing first is a no-op for argmax)
    let peakX=curve[0].x, best=curve[0].y;
    for (let i=1;i<curve.length;i++) if (curve[i].y>best){best=curve[i].y;peakX=curve[i].x;}
    return {name:w.name, plateIdx:w.plateIdx, pts:xs.map((wl,i)=>({wl,y:ys[i]})), curve, peakWl:peakX};
  }).filter(Boolean);
}

// ─── Y-scale transforms ───────────────────────────────────────────────────────
// Produce a transformed copy of `wells` for the chosen Y-scale mode.
//   'raw'  : identity
//   'norm' : per-well, divide y values by that well's curve max (so each well peaks at 1)
//   'log'  : log10(max(y, 1)) globally — clips negatives and sub-1 values to log 0
// Returns wells with the same shape (.pts, .curve, .peakWl, .name, .plateIdx).
function transformWells(wells, mode) {
  if (mode === 'norm') {
    return wells.map(w => {
      const peak = Math.max(...w.curve.map(p=>p.y));
      const s = peak > 0 ? 1/peak : 1;
      return {
        ...w,
        pts:   w.pts  .map(p => ({ wl: p.wl, y: p.y * s })),
        curve: w.curve.map(p => ({ x:  p.x,  y: p.y * s }))
      };
    });
  }
  if (mode === 'log') {
    const lg = y => Math.log10(Math.max(y, 1));
    return wells.map(w => ({
      ...w,
      pts:   w.pts  .map(p => ({ wl: p.wl, y: lg(p.y) })),
      curve: w.curve.map(p => ({ x:  p.x,  y: lg(p.y) }))
    }));
  }
  return wells; // raw
}

// ─── Draw screen grid ─────────────────────────────────────────────────────────
let currentWells = null;
let currentPlate = null;

// Snap a value down/up to the nearest multiple of `step`.
const floorTo = (v, step) => Math.floor(v / step) * step;
const ceilTo  = (v, step) => Math.ceil (v / step) * step;

// Parse a manual X-bound input. Empty or NaN → null (use auto).
function readManualX(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  const s = el.value.trim();
  if (s === '') return null;
  const v = parseFloat(s);
  return isNaN(v) ? null : v;
}

// Format the upper Y-tick label for a given mode and yMax value.
function yMaxLabel(mode, yMax) {
  if (mode === 'norm') return '1';
  if (mode === 'log')  return yMax.toFixed(1);
  // raw: use Ω, the legacy label
  return '\u03A9';
}

// Compute axis domains for screen + PNG rendering.
// `wells` should already be Y-transformed for the chosen mode.
// X bounds: if manualXMin/Max are non-null, they override the data-derived snap.
// Tick values for the X-axis are the manual bounds (or the snapped 100-nm marks).
function computeDomains(wells, mode, manualXMin, manualXMax) {
  let yLo = Infinity, yHi = -Infinity;
  let xLo = Infinity, xHi = -Infinity;
  for (const w of wells) {
    for (const p of w.pts)   { if (p.y < yLo) yLo = p.y; if (p.y > yHi) yHi = p.y;
                                if (p.wl < xLo) xLo = p.wl; if (p.wl > xHi) xHi = p.wl; }
    for (const p of w.curve) { if (p.y < yLo) yLo = p.y; if (p.y > yHi) yHi = p.y; }
  }
  const yPad = (yHi - yLo) * 0.05 || 0.05;  // guard against zero range
  const xPad = 15;

  let xMin, xMax, xTickLo, xTickHi;
  if (manualXMin != null && manualXMax != null && manualXMax > manualXMin) {
    // Manual override: use exact values, no padding, ticks at the bounds.
    xMin = manualXMin; xMax = manualXMax;
    xTickLo = manualXMin; xTickHi = manualXMax;
  } else {
    xMin = floorTo(xLo, 100) - xPad;
    xMax = ceilTo (xHi, 100) + xPad;
    xTickLo = floorTo(xLo, 100);
    xTickHi = ceilTo (xHi, 100);
  }

  return {
    xMin, xMax, xTickLo, xTickHi,
    yMin: yLo - yPad,
    yMax: yHi + yPad,
    yOmega: yHi,
    yMaxLabel: yMaxLabel(mode, yHi)
  };
}

// Draw one well panel into a d3 selection `g` already translated to its origin.
// `yTopVal` is the upper Y-axis tick value, `yTopLbl` its display label.
function drawPanel(g, w, side, xSc, ySc, xTickLo, xTickHi, yTopVal, yTopLbl) {
  g.append('rect').attr('width',side).attr('height',side).attr('fill','#ffffff');
  // Zero-intensity reference line (only drawn if 0 is inside the y-domain)
  if (ySc.domain()[0] <= 0 && ySc.domain()[1] >= 0) {
    g.append('line').attr('x1',0).attr('x2',side).attr('y1',ySc(0)).attr('y2',ySc(0))
      .attr('stroke','#e0e0e0').attr('stroke-width',0.5);
  }
  g.append('g').call(
    d3.axisLeft(ySc).tickValues([0,yTopVal]).tickFormat((_,i)=>i===0?'0':yTopLbl).tickSize(3)
  ).call(ax=>{
    ax.select('.domain').attr('stroke',BORD).attr('stroke-width',0.75);
    ax.selectAll('.tick line').attr('stroke',BORD);
    ax.selectAll('.tick text').attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
      .attr('font-weight','400').attr('fill',MUT);
  });
  g.append('g').attr('transform',`translate(0,${side})`).call(
    d3.axisBottom(xSc).tickValues([xTickLo,xTickHi]).tickSize(3)
  ).call(ax=>{
    ax.select('.domain').attr('stroke',BORD).attr('stroke-width',0.75);
    ax.selectAll('.tick line').attr('stroke',BORD);
    ax.selectAll('.tick text').attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
      .attr('font-weight','400').attr('fill',MUT);
  });
  const lineCol = wavelengthToColor(w.peakWl);
  g.append('path').datum(w.curve)
    .attr('fill','none').attr('stroke',lineCol).attr('stroke-width',6)
    .attr('stroke-linejoin','round').attr('stroke-linecap','round')
    .attr('d',d3.line().x(d=>xSc(d.x)).y(d=>ySc(d.y)).curve(d3.curveCatmullRom));
  g.append('g').selectAll('circle.pt').data(w.pts).enter().append('circle')
    .attr('class','pt')
    .attr('cx',d=>xSc(d.wl)).attr('cy',d=>ySc(d.y))
    .attr('r',1).attr('fill','#999').attr('opacity',0.55);
  g.append('text').attr('x',side-3).attr('y',2)
    .attr('text-anchor','end').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',INK).text(w.name);
  g.append('text').attr('x',side-3).attr('y',16)
    .attr('text-anchor','end').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',MUT).text(Math.round(w.peakWl));
}

// Draw an empty-slot placeholder (used in plate-layout mode for unused wells).
// Same overall dimensions as drawPanel but with a faint dotted border and only
// a position label in the corner, so the plate geometry is preserved without
// the empty slot competing visually with real data.
function drawEmptyPanel(g, posName, side) {
  g.append('rect').attr('x',0).attr('y',0).attr('width',side).attr('height',side)
    .attr('fill','#ffffff').attr('stroke',BORD).attr('stroke-width',0.5)
    .attr('stroke-dasharray','2,3').attr('opacity',0.5);
  g.append('text').attr('x',side-3).attr('y',2)
    .attr('text-anchor','end').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',BORD).text(posName);
}

// Draw the wavelength colorbar into a d3 selection `parent` at offset `oy`.
// `cx` is the horizontal center; `defsId` makes the gradient id unique per call.
function drawColorbarInto(parent, cx, oy, defsId) {
  const bW=320,bH=10,bX=cx-bW/2,bY=oy+2;
  const gr=parent.append('defs').append('linearGradient').attr('id',defsId);
  [400,420,440,460,475,490,510,525,540,555,570,580,590,605,620,650,680,700].forEach(w=>{
    gr.append('stop').attr('offset',`${(w-400)/300*100}%`).attr('stop-color',wavelengthToColor(w));
  });
  parent.append('rect').attr('x',bX).attr('y',bY).attr('width',bW).attr('height',bH).attr('fill',`url(#${defsId})`);
  parent.append('rect').attr('x',bX).attr('y',bY).attr('width',bW).attr('height',bH)
    .attr('fill','none').attr('stroke',BORD).attr('stroke-width',0.5);
  [400,500,600,700].forEach(w=>{
    const x=bX+(w-400)/300*bW;
    parent.append('line').attr('x1',x).attr('x2',x).attr('y1',bY+bH).attr('y2',bY+bH+4)
      .attr('stroke',MUT).attr('stroke-width',0.5);
    parent.append('text').attr('x',x).attr('y',bY+bH+6)
      .attr('dominant-baseline','hanging').attr('text-anchor','middle')
      .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
      .attr('font-weight','400').attr('fill',MUT).text(w);
  });
  parent.append('text').attr('x',cx).attr('y',oy+30)
    .attr('text-anchor','middle').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',MUT).text('Wavelength (nm)');
}

function draw(wells, plate) {
  currentWells = wells;
  currentPlate = plate;
  const uiCols = Math.max(1, Math.min(24, parseInt(document.getElementById('ncols-input').value)||12));
  // Plate mode: use only when (a) we detected a plate format, and (b) the user
  // hasn't overridden the columns input away from the plate width. Override → pack.
  const usePlate = !!(plate && uiCols === plate.cols);
  const nCols = usePlate ? plate.cols : uiCols;
  const nRows = usePlate ? plate.rows : Math.ceil(wells.length / nCols);
  const mg   = {top:18, right:10, bottom:22, left:28};
  const side = 120;
  const cellW = side+mg.left+mg.right, cellH = side+mg.top+mg.bottom;

  const mode = document.getElementById('yscale-input').value || 'raw';
  const tWells = transformWells(wells, mode);
  const dom    = computeDomains(tWells, mode, readManualX('xmin-input'), readManualX('xmax-input'));

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${nCols},${cellW}px)`;

  if (usePlate) {
    // Build a sparse plate: one cell per slot, filled where a well exists.
    const wellByIdx = new Map(tWells.map(w => [w.plateIdx, w]));
    const totalSlots = plate.rows * plate.cols;
    for (let i=0;i<totalSlots;i++) {
      const cell = document.createElement('div');
      cell.className = 'panel-cell';
      const svg = d3.create('svg').attr('width',cellW).attr('height',cellH);
      const g   = svg.append('g').attr('transform',`translate(${mg.left},${mg.top})`);
      const w = wellByIdx.get(i);
      if (w) {
        const xSc = d3.scaleLinear().domain([dom.xMin,dom.xMax]).range([0,side]);
        const ySc = d3.scaleLinear().domain([dom.yMin,dom.yMax]).range([side,0]);
        drawPanel(g, w, side, xSc, ySc, dom.xTickLo, dom.xTickHi, dom.yOmega, dom.yMaxLabel);
      } else {
        drawEmptyPanel(g, plateCoord(i, plate.cols).name, side);
      }
      cell.appendChild(svg.node());
      grid.appendChild(cell);
    }
  } else {
    // Packed grid (no plate, or user overrode columns): one cell per well, left-to-right.
    tWells.forEach(w => {
      const cell = document.createElement('div');
      cell.className = 'panel-cell';
      const svg = d3.create('svg').attr('width',cellW).attr('height',cellH);
      const g   = svg.append('g').attr('transform',`translate(${mg.left},${mg.top})`);
      const xSc = d3.scaleLinear().domain([dom.xMin,dom.xMax]).range([0,side]);
      const ySc = d3.scaleLinear().domain([dom.yMin,dom.yMax]).range([side,0]);
      drawPanel(g, w, side, xSc, ySc, dom.xTickLo, dom.xTickHi, dom.yOmega, dom.yMaxLabel);
      cell.appendChild(svg.node());
      grid.appendChild(cell);
    });
  }

  drawColorbar();
  const plateLabel = usePlate ? ` · ${plate.rows*plate.cols}-well plate layout` : '';
  document.getElementById('plotTitle').textContent =
    `Spectra (${titleYDesc(mode, dom.yOmega)})${plateLabel}`;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('main').style.display    = 'block';
  document.getElementById('downloadBtn').disabled  = false;
}

// Human-readable Y-axis description for the plot title.
function titleYDesc(mode, yMax) {
  if (mode === 'norm') return 'Normalized to peak per well';
  if (mode === 'log')  return `log\u2081\u2080 intensity, max = ${yMax.toFixed(2)}`;
  return `Samples Normalized by OD600,  \u03A9 = ${(Math.round(yMax/1000)*1000).toLocaleString()}`;
}

function drawColorbar() {
  const svg = d3.select('#colorbarSvg');
  svg.selectAll('*').remove();
  const W = +svg.attr('width');
  drawColorbarInto(svg, W/2, 0, 'cbg-screen');
}

// ─── PNG export ───────────────────────────────────────────────────────────────
function downloadPNG() {
  if (!currentWells) return;
  const targetW  = Math.max(400, Math.min(16000, parseInt(document.getElementById('width-input').value)||2000));
  const uiCols   = Math.max(1, Math.min(24, parseInt(document.getElementById('ncols-input').value)||12));
  // Mirror draw()'s plate-mode decision so the PNG matches the on-screen layout.
  const usePlate = !!(currentPlate && uiCols === currentPlate.cols);
  const nCols    = usePlate ? currentPlate.cols : uiCols;
  const nRows    = usePlate ? currentPlate.rows : Math.ceil(currentWells.length / nCols);
  const mg       = {top:18, right:10, bottom:22, left:28};
  const side     = 120;
  const cellW    = side+mg.left+mg.right, cellH = side+mg.top+mg.bottom;
  const gridW    = nCols*cellW, gridH = nRows*cellH;
  const footerH  = 42+20+16+10;
  const totalW   = gridW, totalH = gridH+footerH+14;
  const scale    = targetW/totalW;
  const mode     = document.getElementById('yscale-input').value || 'raw';
  const tWells   = transformWells(currentWells, mode);
  const dom2     = computeDomains(tWells, mode, readManualX('xmin-input'), readManualX('xmax-input'));

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('xmlns','http://www.w3.org/2000/svg');
  svgEl.setAttribute('width',  String(targetW));
  svgEl.setAttribute('height', String(Math.round(totalH*scale)));
  svgEl.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);
  const root = d3.select(svgEl);
  root.append('rect').attr('width',totalW).attr('height',totalH).attr('fill','#ffffff');

  if (usePlate) {
    const wellByIdx = new Map(tWells.map(w => [w.plateIdx, w]));
    const totalSlots = currentPlate.rows * currentPlate.cols;
    for (let i=0;i<totalSlots;i++) {
      const col=i%nCols, row=Math.floor(i/nCols);
      const ox=col*cellW+mg.left, oy=row*cellH+mg.top;
      const g=root.append('g').attr('transform',`translate(${ox},${oy})`);
      const w = wellByIdx.get(i);
      if (w) {
        const xSc=d3.scaleLinear().domain([dom2.xMin,dom2.xMax]).range([0,side]);
        const ySc=d3.scaleLinear().domain([dom2.yMin,dom2.yMax]).range([side,0]);
        drawPanel(g, w, side, xSc, ySc, dom2.xTickLo, dom2.xTickHi, dom2.yOmega, dom2.yMaxLabel);
      } else {
        drawEmptyPanel(g, plateCoord(i, currentPlate.cols).name, side);
      }
    }
  } else {
    tWells.forEach((w, idx) => {
      const col=idx%nCols, row=Math.floor(idx/nCols);
      const ox=col*cellW+mg.left, oy=row*cellH+mg.top;
      const g=root.append('g').attr('transform',`translate(${ox},${oy})`);
      const xSc=d3.scaleLinear().domain([dom2.xMin,dom2.xMax]).range([0,side]);
      const ySc=d3.scaleLinear().domain([dom2.yMin,dom2.yMax]).range([side,0]);
      drawPanel(g, w, side, xSc, ySc, dom2.xTickLo, dom2.xTickHi, dom2.yOmega, dom2.yMaxLabel);
    });
  }

  const fy=gridH+14;
  drawColorbarInto(root, totalW/2, fy, 'cbg-export');
  // Title + subtitle below the colorbar (colorbar occupies ~30px including its label)
  const plateLabel = usePlate ? ` · ${currentPlate.rows*currentPlate.cols}-well plate layout` : '';
  root.append('text').attr('x',totalW/2).attr('y',fy+56)
    .attr('text-anchor','middle').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',INK)
    .text(`Spectra (${titleYDesc(mode, dom2.yOmega)})${plateLabel}`);
  root.append('text').attr('x',totalW/2).attr('y',fy+70)
    .attr('text-anchor','middle').attr('dominant-baseline','hanging')
    .attr('font-family',SVG_FONT).attr('font-size',SVG_FS)
    .attr('font-weight','400').attr('fill',MUT)
    .text('Points = Relative Intensity Data \u00B7 Lines = LOESS Fitted Curves');

  const blob=new Blob([new XMLSerializer().serializeToString(svgEl)],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    canvas.width=+svgEl.getAttribute('width');
    canvas.height=+svgEl.getAttribute('height');
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    canvas.toBlob(pngBlob=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(pngBlob);
      a.download=`${loadedBasename}.png`; a.click();
    },'image/png');
  };
  img.onerror=()=>{URL.revokeObjectURL(url);alert('PNG export failed.');};
  img.src=url;
}

// ─── Loading pipeline ─────────────────────────────────────────────────────────
let loadedRawText = null;   // kept so changing λ offset can re-parse without re-reading
let loadedFilename = '';

function showLoading() {
  document.getElementById('loading').style.display='block';
  document.getElementById('welcome').style.display='none';
  document.getElementById('main').style.display='none';
}
function getOffset() {
  const v = parseFloat(document.getElementById('offset-input').value);
  return isNaN(v) ? 0 : v;
}
function handleText(text, filename) {
  showLoading();
  const isFreshLoad = (text !== loadedRawText) || (filename !== loadedFilename);
  loadedRawText  = text;
  loadedFilename = filename;
  loadedBasename = filename.replace(/\.[^.]+$/,'');
  requestAnimationFrame(()=>setTimeout(()=>{
    try {
      const { wells: raw, plate } = parseSpectraMax(text, getOffset());
      const wells = processWells(raw);
      if (!wells.length) throw new Error('No wells with valid spectral data found');
      // On a fresh file load, snap the columns input to the plate width so the
      // default layout matches the physical plate. Re-parses (e.g. λ-offset
      // change) preserve whatever the user has set.
      if (isFreshLoad && plate) {
        document.getElementById('ncols-input').value = plate.cols;
      }
      // On a fresh file load, reset display-only controls to their defaults.
      // (Re-parses triggered by changing λ offset preserve user adjustments.)
      if (isFreshLoad) {
        document.getElementById('yscale-input').value = 'raw';
        document.getElementById('xmin-input').value   = '400';
        document.getElementById('xmax-input').value   = '700';
      }
      draw(wells, plate);
      const plateStr = plate ? ` · ${plate.rows*plate.cols}-well plate` : '';
      document.getElementById('statusLeft').textContent=`Loaded ${wells.length} wells${plateStr}`;
      document.getElementById('statusRight').textContent=filename;
      document.getElementById('statusBar').style.display='flex';
    } catch(e) {
      console.error(e);
      currentWells = null;
      currentPlate = null;
      loadedRawText = null;
      document.getElementById('welcome').style.display='flex';
      document.getElementById('statusBar').style.display='none';
      document.getElementById('downloadBtn').disabled = true;
      alert('Could not parse file:\n\n'+e.message);
    }
    document.getElementById('loading').style.display='none';
  },30));
}
function readFile(file) {
  const r=new FileReader();
  r.onload=e=>handleText(e.target.result,file.name);
  r.onerror=()=>alert('Could not read file');
  r.readAsText(file,'latin1');
}

document.getElementById('yscale-input').addEventListener('change', redrawOnly);
document.getElementById('xmin-input').addEventListener('input', redrawOnly);
document.getElementById('xmax-input').addEventListener('input', redrawOnly);
// Changing the λ offset re-parses the held raw text (offset is applied during parse).
function reparseWithCurrentOffset() {
  if (!loadedRawText) return;
  handleText(loadedRawText, loadedFilename);
}
document.getElementById('offset-input').addEventListener('change', reparseWithCurrentOffset);
document.getElementById('offset-input').addEventListener('keydown', e=>{ if(e.key==='Enter') reparseWithCurrentOffset(); });
document.getElementById('downloadBtn').addEventListener('click',downloadPNG);

document.addEventListener('dragleave',e=>{e.preventDefault();dn--;if(dn<=0){dn=0;dz.classList.remove('drag-over');}});
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop',     e=>{
  e.preventDefault();dn=0;dz.classList.remove('drag-over');
  const f=e.dataTransfer.files[0]; if(f) readFile(f);
});
